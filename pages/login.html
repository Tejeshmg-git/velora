<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Velora Sanctuary</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,400,700&f[]=satoshi@300,400,700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode coming-soon-page"> <!-- Reusing terminal base for consistency -->
    
    <!-- Minimalist Nav -->
    <nav class="coming-soon-nav">
        <a href="../index.html" class="back-link">← Home</a>
        <div class="nav-controls" style="display: flex; gap: 15px; align-items: center;">
            <div class="rtl-toggle" id="rtl-toggle" style="cursor: pointer; font-size: 12px; font-weight: bold; letter-spacing: 1px; color: var(--color-primary);">RTL</div>
            <div class="theme-toggle" id="theme-toggle" style="cursor: pointer;">
                <span class="toggle-icon">☾</span>
            </div>
        </div>
    </nav>

    <main class="terminal-container">
        <div class="auth-card reveal-item">
            
            <a href="../index.html" class="logo brand-logo" style="margin: 0 auto var(--space-4); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg class="logo-icon-svg" viewBox="0 0 24 24" fill="currentColor" style="width: 32px; height: 32px;"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7z"></path></svg>
                <span class="logo-text">VELORA</span>
            </a>

            <div class="auth-header text-center">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Identify yourself to access the Sanctuary.</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉</span>
                        <input type="email" id="email" placeholder="name@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <span class="password-toggle" id="togglePassword">👁</span>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember Me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Access Sanctuary</button>
            </form>

            <div class="auth-divider">
                <span>OR CONTINUE WITH</span>
            </div>

            <div class="social-login">
                <button class="social-btn">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" style="width: 16px;">
                    Google
                </button>
                <button class="social-btn">
                    <svg width="16" height="16" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                    Apple
                </button>
            </div>

            <div class="auth-footer text-center">
                <p>Don't have an account? <a href="signup.html">Join now</a></p>
            </div>

        </div>
    </main>

    <script>
        // RTL Toggle Logic
        const rtlToggle = document.getElementById('rtl-toggle');
        const savedRTL = localStorage.getItem('rtl') === 'true';
        if (savedRTL) {
            document.documentElement.setAttribute('dir', 'rtl');
            document.body.classList.add('rtl');
            if (rtlToggle) rtlToggle.innerText = 'LTR';
        }
        if (rtlToggle) {
            rtlToggle.addEventListener('click', () => {
                if (document.documentElement.dir === 'rtl') {
                    document.documentElement.removeAttribute('dir');
                    document.body.classList.remove('rtl');
                    localStorage.setItem('rtl', 'false');
                    rtlToggle.innerText = 'RTL';
                } else {
                    document.documentElement.setAttribute('dir', 'rtl');
                    document.body.classList.add('rtl');
                    localStorage.setItem('rtl', 'true');
                    rtlToggle.innerText = 'LTR';
                }
            });
        }

        // Theme Toggle Logic
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        const icon = toggle.querySelector('.toggle-icon');

        toggle.addEventListener('click', () => {
            const isDark = body.classList.contains('dark-mode');
            if (isDark) {
                body.classList.replace('dark-mode', 'light-mode');
                icon.innerText = '☀';
            } else {
                body.classList.replace('light-mode', 'dark-mode');
                icon.innerText = '☾';
            }
        });

        // Password Toggle Logic
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁' : '🙈';
        });
    </script>
</body>
</html>
